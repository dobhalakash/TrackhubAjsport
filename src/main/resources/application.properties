# ============================================
# TrackHub Backend Configuration
# ============================================

# Server
server.port=${PORT:8081}
server.servlet.context-path=/api

# Application name
spring.application.name=trackhub-backend

# ============================================
# DATABASE CONFIGURATION (MySQL 8)
# ============================================
spring.datasource.url=${DB_URL:jdbc:mysql://roundhouse.proxy.rlwy.net:35430/railway?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:wTqoOtuMaupSksQxbACALxqskdKdCFOE}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
# NOTE: "update" auto-migrates the schema on boot, which is convenient in
# development but risky in production (no rollback, can lock large tables).
# Switch to "validate" + a migration tool (Flyway/Liquibase) before launch.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads
# Public, internet-reachable origin of this backend (scheme + host, no path),
# used to build absolute URLs for uploaded images so the frontend never has
# to guess where the API lives. In production this is your API subdomain,
# e.g. https://api.trackhub.com - NOT the frontend's domain.
app.public-url=${APP_PUBLIC_URL:https://api.ajsport.shop/api}

# ============================================
# JWT CONFIGURATION
# ============================================
# DUMMY dev secret with a safe fallback. In production, ALWAYS set JWT_SECRET
# to a long, random, environment-specific value (e.g. `openssl rand -base64 64`)
# via an environment variable - never reuse this default.
app.jwt.secret=${JWT_SECRET:TrackHubSuperSecretKeyForJWTTokenGenerationChangeInProduction2024}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRY_MS:3600000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRY_MS:604800000}

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.dreamnest=${LOG_LEVEL:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %-5level - %logger{36} - %msg%n
# Logs are written to disk so the admin can download them for review (see
# AdminLogController). Rotates daily, keeps 14 days, caps total size at 200MB.
logging.file.name=${LOG_FILE:logs/trackhub.log}
logging.logback.rollingpolicy.max-file-size=20MB
logging.logback.rollingpolicy.max-history=14
logging.logback.rollingpolicy.total-size-cap=200MB

# ============================================
# CORS
# ============================================
# Comma-separated list of allowed origins. In production this MUST be your
# real frontend domain(s) (e.g. https://www.sksports.com) - never "*" once
# the app handles auth cookies/tokens.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://www.ajsport.shop}
# Public URL of the FRONTEND (not this API) - used to build links inside emails
# (e.g. "your product is back in stock" links to the storefront, not the API).
app.public-url=${APP_PUBLIC_URL:https://api.ajsport.shop}

# ============================================
# PAYMENTS
# ============================================
# Fallback "collection account" used when an order contains items from
# multiple businesses, or the seller hasn't configured their own UPI ID yet.
# Sellers can set their own UPI ID from the Business Dashboard -> Payment Settings.
# This is only used to render the QR/deep-link as a visual aid; it is NOT how
# payments are verified. Verification happens through Razorpay below.
dreamnest.payment.platform-upi-id=trackhub@upi
dreamnest.payment.platform-payee-name=TrackHub

# ---- Razorpay (primary, verified gateway) ----
# DUMMY/PLACEHOLDER credentials for development only. Replace with your real
# Razorpay Key ID + Key Secret from https://dashboard.razorpay.com/app/keys
# before going live. The Key ID is safe to expose to the frontend; the Key
# Secret must NEVER be sent to the frontend or committed to source control -
# in production, set it via an environment variable (RAZORPAY_KEY_SECRET) or
# a secrets manager instead of this file.
dreamnest.payment.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_live_T5A5PcYcE3OqHG}
dreamnest.payment.razorpay.key-secret=${RAZORPAY_KEY_SECRET:xHpTOE4IZI1KW4WyXmJjd2lx}
dreamnest.payment.razorpay.currency=INR
# Razorpay also signs asynchronous webhook events with a separate secret
# (Dashboard -> Webhooks). Set this once you configure a webhook URL.
dreamnest.payment.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:Akashwani@9921197992}

# ---- Legacy PhonePe webhook scaffold (optional / inactive unless configured) ----
dreamnest.payment.phonepe.merchant-id=${PHONEPE_MERCHANT_ID:DUMMYMERCHANTUAT}
dreamnest.payment.phonepe.salt-key=${PHONEPE_SALT_KEY:dummy-salt-key-replace-me}
dreamnest.payment.phonepe.salt-index=1

# ============================================
# EMAIL (registration / verification OTPs)
# ============================================
# DUMMY placeholder SMTP credentials. Replace with a real transactional email
# provider (SendGrid, AWS SES, Postmark, or Gmail with an App Password) before
# launch. Never commit real credentials - use environment variables.
spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:support@ajsport.shop}
spring.mail.password=${MAIL_PASSWORD:Akashwani@9921197992}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
dreamnest.mail.from=${MAIL_FROM:Ajsport <support@ajsport.shop>}

# ============================================
# SMS (mobile OTP) - pluggable gateway
# ============================================
# DUMMY placeholder. TrackHub ships with a console-logging SMS sender for
# local development (see ConsoleSmsServiceImpl). To go live, implement
# SmsService against your SMS gateway (e.g. MSG91, Twilio, Fast2SMS) and wire
# these credentials in.
dreamnest.sms.api-key=${SMS_API_KEY:DUMMY_SMS_API_KEY}
dreamnest.sms.sender-id=${SMS_SENDER_ID:DRMNST}
dreamnest.sms.enabled=${SMS_ENABLED:false}

# ============================================
# OTP / VERIFICATION
# ============================================
dreamnest.otp.expiry-minutes=10
dreamnest.otp.length=6

# ============================================
# PAYOUTS (business commission/settlement)
# ============================================
# Percentage the platform keeps from each order; the rest is owed to the
# business as their payout share. Adjust to your actual commission model.
dreamnest.payout.platform-commission-percent=10

# ============================================
# SOCIAL LOGIN (Google / Facebook / Apple)
# ============================================
# DUMMY placeholders - sign-in buttons will render but fail verification
# until you set these to real values from each provider's developer console.
# The frontend only ever sees the Client ID (safe to expose); secrets stay
# server-side only and are only used where the provider's flow requires one.

# Google: console.cloud.google.com -> APIs & Services -> Credentials -> OAuth Client ID (Web application)
dreamnest.oauth.google.client-id=${GOOGLE_CLIENT_ID:DUMMY_GOOGLE_CLIENT_ID.apps.googleusercontent.com}

# Facebook: developers.facebook.com -> My Apps -> Settings -> Basic
dreamnest.oauth.facebook.app-id=${FACEBOOK_APP_ID:1423741299577231}
dreamnest.oauth.facebook.app-secret=${FACEBOOK_APP_SECRET:c829994b61316baba1925353a649710a}

# Apple: developer.apple.com -> Certificates, Identifiers & Profiles -> Services ID
dreamnest.oauth.apple.client-id=${APPLE_CLIENT_ID:com.sksports.dummy.service}

# ============================================
# SHIPROCKET (shipping / AWB / tracking)
# ============================================
# DUMMY placeholders. Create a free Shiprocket account at shiprocket.in,
# register at least one Pickup Location (Settings -> Pickup Addresses) and
# use its exact nickname below - Shiprocket rejects shipments otherwise.
dreamnest.shiprocket.email=${SHIPROCKET_EMAIL:dummy@example.com}
dreamnest.shiprocket.password=${SHIPROCKET_PASSWORD:dummy_password}
dreamnest.shiprocket.pickup-location=${SHIPROCKET_PICKUP_LOCATION:Primary}
# Used to sanity-check inbound Shiprocket tracking webhooks (Shiprocket does
# not sign webhook payloads, so we ask it to include this as a query param:
# https://yourdomain.com/api/shipments/shiprocket/webhook?token=...).
dreamnest.shiprocket.webhook-token=${SHIPROCKET_WEBHOOK_TOKEN:dummy_webhook_token_replace_me}
# Default package weight/dimensions used when creating a shipment, since
# individual product weights aren't tracked yet. Tune these to your typical
# jersey/apparel package before going live.
dreamnest.shiprocket.default-weight-kg=0.3
dreamnest.shiprocket.default-length-cm=30
dreamnest.shiprocket.default-breadth-cm=24
dreamnest.shiprocket.default-height-cm=3

